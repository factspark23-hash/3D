name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  supabase:
    name: Supabase Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Verify edge functions
        run: |
          deno check supabase/functions/serve-site/index.ts
          deno check supabase/functions/api-proxy/index.ts

      - name: Prepare public/
        run: |
          mkdir -p public
          cp index.html public/
          cp -r src public/
          cp -r models public/
          cp server.js public/
          sed -i 's|<script src="src/app.js"></script>|<script src="src/app.js"></script>\n    <script>window.__SUPABASE_FN_URL = "https://${{ secrets.SUPABASE_PROJECT_REF }}.functions.supabase.co";</script>\n    <script src="src/deploy-config.js"></script>|' public/index.html

      - name: Deploy to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy serve-site --no-verify-jwt
          supabase functions deploy api-proxy --no-verify-jwt

      - run: rm -rf public

  vercel:
    name: Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
