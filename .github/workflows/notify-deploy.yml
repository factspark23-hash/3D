name: Trigger Deploy

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 3D-deploy pipeline
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.DEPLOY_PAT }}" \
            https://api.github.com/repos/factspark23-hash/3D-deploy/dispatches \
            -d '{"event_type":"sync-from-3d"}'
