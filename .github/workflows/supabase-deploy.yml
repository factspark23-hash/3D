name: Deploy to Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Verify edge functions
        run: |
          deno check supabase/functions/serve-site/index.ts
          deno check supabase/functions/api-proxy/index.ts

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Prepare public directory
        run: |
          mkdir -p public
          cp index.html public/
          cp -r src public/
          cp -r models public/
          cp server.js public/

          # Inject deploy-config.js after app.js
          sed -i 's|<script src="src/app.js"></script>|<script src="src/app.js"></script>\n    <script>window.__SUPABASE_FN_URL = "https://${{ secrets.SUPABASE_PROJECT_REF }}.functions.supabase.co";</script>\n    <script src="src/deploy-config.js"></script>|' public/index.html

          echo "Prepared public/:"
          ls -la public/

      - name: Deploy to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy serve-site --no-verify-jwt
          supabase functions deploy api-proxy --no-verify-jwt
          echo "✅ Supabase deployed"

      - name: Cleanup
        run: rm -rf public
